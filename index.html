<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ----------- Favicon ---------- -->
    <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon">

    <!-- ----------- Swiper's CSS ---------- -->
    <link rel="stylesheet" href="./src/output.css">

    <!-- ----------- Remix Icon ---------- -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
        integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Indore Plants</title>
</head>

<body>
    <!-- ----------- Header ---------- -->
    <header id="navbars" class="bg-green-950 w-full fixed top-0 left-0 z-50">
        <nav class="container mx-auto flex justify-between items-center h-16 sm:h-20">
            <div class="font-Lobster sm:text-2xl">IndorePlants.</div>

            <div id="nav-menu"
                class="absolute top-0 -left-full min-h-[80vh] w-full bg-green-950/80 backdrop-blur-sm flex items-center justify-center duration-300 overflow-hidden lg:static lg:min-h-fit lg:bg-transparent lg:w-auto">
                <ul class="flex flex-col items-center gap-8 lg:flex-row">
                    <li>
                        <a href="#home" class="nav-link">Home</a>
                    </li>
                    <li>
                        <a href="#about" class="nav-link">About</a>
                    </li>
                    <li>
                        <a href="#popular" class="nav-link">Popular</a>
                    </li>
                    <li>
                        <a href="#review" class="nav-link">Review</a>
                    </li>
                </ul>

                <div class="absolute bottom-0 -right-10 opacity-90 lg:hidden">
                    <img src="./assets/images/leaf-1.png" alt="" class="w-32">
                </div>

                <div class="absolute -top-5 -left-5 rotate-90 opacity-90 lg:hidden">
                    <img src="./assets/images/leaf-2.png" alt="" class="w-32">
                </div>
            </div>

            <div class="text-lg sm:text-3xl cursor-pointer z-50 lg:hidden">
                <i class="ri-menu-4-line" id="hamburger"></i>
            </div>
        </nav>
    </header>

    <main>
        <!-- ----------- Home ---------- -->
        <section id="home" class="relative">
            <div class="container mx-auto">
                <!-- blob 1  -->
                 <div class="size-64 bg-green-700 rounded-full blur-3xl -z-10 opacity-40 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></div>

                <!-- blob 2  -->
                 <div class="size-64 bg-green-700 rounded-full blur-3xl -z-10 opacity-40 absolute right-0 bottom-0"></div>


                <div class="flex flex-col items-center gap-5 lg:flex-row">
                    <!-- content  -->
                    <div class="w-full space-y-5 lg:w-1/2">
                        <h1>
                            <span class="text-yellow-500">Plants</span> make a <br> positive
                            <span class="text-yellow-500">impact</span> on <br> your environment
                        </h1>

                        <p class="text-slate-300 font-Lobster">
                            Explore our diverse collection of vibrant plants, designed to purify your air and bring
                            natural beauty into your modern home!
                        </p>

                        <div class="flex flex-col gap-2 sm:flex-row md:gap-4 lg:pt-5 xl:pt-10">
                            <button class="btn">
                                <span class="font-bold">Shop Now</span>
                                <i class="ri-leaf-line"></i>
                            </button>

                            <button class="btn btn-outline">
                                <span class="font-bold">Know More</span>
                                <i class="ri-leaf-line"></i>
                            </button>
                        </div>

                        <p class="text-xs text-slate-300 font-Lobster">You will get 30-days free trial.</p>

                        <div class="flex items-center gap-5 text-lg lg:pt-10">
                            <i class="ri-facebook-fill text-slate-300 hover:text-yellow-500 cursor-pointer duration-300"></i>
                            <i class="ri-twitter-x-line text-slate-300 hover:text-yellow-500 cursor-pointer duration-300 text-base"></i>
                            <i class="ri-instagram-line text-slate-300 hover:text-yellow-500 cursor-pointer duration-300"></i>
                            <i class="ri-linkedin-fill text-slate-300 hover:text-yellow-500 cursor-pointer duration-300"></i>
                        </div>
                    </div>

                    <!-- image  -->
                     <div class="w-full relative lg:w-1/2">
                        <img src="./assets/images/home.png" alt="home_image">

                        <!-- leaf -->
                         <div class="absolute -top-10 right-0 opacity-30 animate-movingY xl:top-5">
                            <i class="ri-leaf-line text-6xl text-yellow-500"></i>
                         </div>
                        <!-- flower -->
                         <div class="absolute left-0 bottom-0 opacity-30 xl:bottom-12 animate-rotating">
                            <i class="ri-flower-line text-6xl text-yellow-500"></i>
                         </div>
                        <!-- plant -->
                         <div class="absolute -top-8 -left-5 opacity-30 hidden lg:block animate-scalingUp">
                            <i class="ri-plant-line text-6xl text-yellow-500"></i>
                         </div>
                        
                     </div>
                </div>
            </div>
        </section>
        <!-- ----------- Services ---------- -->
        <section id="service">

        </section>

        <!-- ----------- About Us ---------- -->
        <section id="about">

        </section>

        <!-- ----------- Popular ---------- -->
        <section id="popular">

        </section>
    </main>


    <!-- ----------- main js ---------- -->
    <script src="./main.js"></script>
</body>

</html>
